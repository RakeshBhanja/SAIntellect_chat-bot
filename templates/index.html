<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SAIntellect Solutions — Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sora', sans-serif;
      background: #0B1120;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .shell {
      width: 450px;
      height: 660px;
      background: #0B1120;
      border: 1px solid rgba(0,212,255,0.18);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: #112240;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(0,212,255,0.15);
      flex-shrink: 0;
    }
    .logo {
      width: 44px; height: 44px; border-radius: 50%;
      background: #1E6FFF;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; color: #fff; font-size: 13px; flex-shrink: 0;
      letter-spacing: 0.5px;
    }
    .hname { font-size: 14px; font-weight: 600; color: #E8EDF5; }
    .hsub  { font-size: 11px; color: #8899B4; margin-top: 1px; }
    .hstatus { font-size: 11px; color: #00D4FF; display: flex; gap: 5px; align-items: center; margin-top: 3px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #00D4FF; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .msgs {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .msgs::-webkit-scrollbar { width: 4px; }
    .msgs::-webkit-scrollbar-thumb { background: rgba(0,212,255,.2); border-radius: 2px; }

    .msg { display: flex; gap: 8px; align-items: flex-end; animation: up .25s ease; }
    @keyframes up { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .msg.user { flex-direction: row-reverse; }

    .av {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600;
    }
    .av.b { background: #1E6FFF; color: #fff; }
    .av.u { background: #1E3A5F; color: #8899B4; }

    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.75;
      white-space: pre-wrap;
    }
    .b .bubble {
      background: #1A2E4A;
      border: 1px solid rgba(0,212,255,.15);
      border-radius: 12px 12px 12px 3px;
      color: #E8EDF5;
    }
    .user .bubble {
      background: #1E6FFF;
      border-radius: 12px 12px 3px 12px;
      color: #fff;
    }

    .typing-bubble {
      display: flex; gap: 5px; padding: 12px 16px;
      background: #1A2E4A;
      border: 1px solid rgba(0,212,255,.15);
      border-radius: 12px 12px 12px 3px;
      width: 56px;
    }
    .typing-bubble span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #00D4FF;
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .2s; }
    .typing-bubble span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-7px)} }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chip {
      font-size: 11px; padding: 5px 11px; border-radius: 20px; cursor: pointer;
      background: rgba(30,111,255,.1);
      border: 1px solid rgba(30,111,255,.3);
      color: #00D4FF; font-family: 'Sora', sans-serif;
      transition: all .15s;
    }
    .chip:hover { background: rgba(30,111,255,.25); border-color: #00D4FF; }

    .input-row {
      padding: 12px 14px;
      border-top: 1px solid rgba(0,212,255,.12);
      display: flex; gap: 10px; align-items: center;
      background: #0D1526; flex-shrink: 0;
    }
    #inp {
      flex: 1;
      background: #1A2E4A;
      border: 1px solid rgba(0,212,255,.15);
      border-radius: 10px;
      padding: 10px 14px;
      color: #E8EDF5;
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    #inp::placeholder { color: #8899B4; }
    #inp:focus { border-color: rgba(0,212,255,.45); }
    #btn {
      width: 42px; height: 42px; border-radius: 10px;
      background: #1E6FFF; border: none; cursor: pointer;
      color: #fff; font-size: 18px;
      transition: opacity .2s; flex-shrink: 0;
    }
    #btn:hover { opacity: .8; }
    #btn:disabled { opacity: .4; cursor: default; }
  </style>
</head>
<body>

<div class="shell">
  <div class="header">
    <div class="logo">SAIS</div>
    <div>
      <div class="hname">SAIntellect Solutions</div>
      <div class="hsub">HIG-143, Lumbini Vihar, Bhubaneswar, Odisha</div>
      <div class="hstatus"><span class="dot"></span>Virtual Assistant — Online</div>
    </div>
  </div>

  <div class="msgs" id="msgs">
    <div class="msg b">
      <div class="av b">SAIS</div>
      <div>
        <div class="bubble">Hello! Welcome to SAIntellect Solutions.

I can answer all your questions about our company, services, products, team, awards, and careers — directly and completely!

What would you like to know?</div>
        <div class="chips" id="chips">
          <button class="chip" onclick="chip(this)">About SAIntellect</button>
          <button class="chip" onclick="chip(this)">AI services</button>
          <button class="chip" onclick="chip(this)">Data Analytics</button>
          <button class="chip" onclick="chip(this)">SaaS Platforms</button>
          <button class="chip" onclick="chip(this)">Contact details</button>
          <button class="chip" onclick="chip(this)">Careers</button>
          <button class="chip" onclick="chip(this)">Awards</button>
        </div>
      </div>
    </div>
  </div>

  <div class="input-row">
    <input type="text" id="inp" placeholder="Ask anything about SAIntellect Solutions..."
           onkeydown="if(event.key==='Enter') send()"/>
    <button id="btn" onclick="send()">&#10148;</button>
  </div>
</div>

<script>
  const msgsEl = document.getElementById('msgs');
  const inpEl  = document.getElementById('inp');
  const btnEl  = document.getElementById('btn');

  function addMsg(text, role) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (role === 'bot' ? 'b' : 'user');
    const av = document.createElement('div');
    av.className = 'av ' + (role === 'bot' ? 'b' : 'u');
    av.textContent = role === 'bot' ? 'SAIS' : 'You';
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.textContent = text;
    wrap.appendChild(av);
    wrap.appendChild(bub);
    msgsEl.appendChild(wrap);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg b';
    wrap.id = 'typing';
    const av = document.createElement('div');
    av.className = 'av b';
    av.textContent = 'SAIS';
    const t = document.createElement('div');
    t.className = 'typing-bubble';
    t.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(av);
    wrap.appendChild(t);
    msgsEl.appendChild(wrap);
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function send(text) {
    const q = text || inpEl.value.trim();
    if (!q) return;
    inpEl.value = '';
    btnEl.disabled = true;
    addMsg(q, 'user');
    showTyping();
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: q })
      });
      const data = await res.json();
      removeTyping();
      addMsg(data.reply || 'Sorry, something went wrong.', 'bot');
    } catch(e) {
      removeTyping();
      addMsg('Connection error. Make sure app.py is running on port 5000.', 'bot');
    }
    btnEl.disabled = false;
    inpEl.focus();
  }

  function chip(el) {
    document.getElementById('chips').style.display = 'none';
    send(el.textContent);
  }
</script>
</body>
</html>
